name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-cwilson613*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print what would publish, do not actually publish)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: |
          # On a tag push, GITHUB_REF_NAME is e.g. "v0.57.1-cwilson613.2"
          # On workflow_dispatch there is no tag — use what's already in package.json
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            FORK_VER="${GITHUB_REF_NAME#v}"
          else
            FORK_VER=$(node -p "require('./packages/coding-agent/package.json').version")
          fi
          echo "fork_version=$FORK_VER" >> $GITHUB_OUTPUT
          echo "Publishing version: $FORK_VER"

      - name: Stamp version into all packages
        run: |
          FORK_VER="${{ steps.version.outputs.fork_version }}"
          for pkg_json in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg_json', 'utf8'));
              const old = pkg.version;
              pkg.version = '${FORK_VER}';
              fs.writeFileSync('$pkg_json', JSON.stringify(pkg, null, '\t') + '\n');
              console.log('Stamped', pkg.name, old, '->', '${FORK_VER}');
            "
          done

      - name: Sync inter-package dependency versions
        run: node scripts/sync-versions.js

      - name: Install dependencies
        run: npm ci

      # Build using root script which enforces correct dependency order:
      # tui → ai → agent → coding-agent (mirrors upstream's build script exactly)
      - name: Build all packages
        run: npm run build

      # Publish in dependency order
      - name: Publish @cwilson613/pi-tui
        run: npm publish --access public ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: packages/tui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cwilson613/pi-ai
        run: npm publish --access public ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: packages/ai
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cwilson613/pi-agent-core
        run: npm publish --access public ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: packages/agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cwilson613/pi-coding-agent
        run: npm publish --access public ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: packages/coding-agent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "### Published ${{ steps.version.outputs.fork_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`@cwilson613/pi-tui\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@cwilson613/pi-ai\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@cwilson613/pi-agent-core\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`@cwilson613/pi-coding-agent\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`$GITHUB_REF_NAME\`" >> $GITHUB_STEP_SUMMARY
